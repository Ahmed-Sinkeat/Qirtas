name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK stack
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libgtksourceview-5-dev libadwaita-1-dev libsqlite3-dev

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Test
        run: zig build test
